<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- 🔥 SOLUCIÓN CELULAR -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mi portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;

    display: flex;
    justify-content: center;
    align-items: flex-start; /* 👈 CAMBIO CLAVE */

    min-height: 100vh;
    padding: 20px; /* 👈 espacio en celular */
}

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
        }

        h1 {
            margin: 15px 0 5px;
        }

        p {
            font-size: 14px;
            color: #ddd;
        }

        .links a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: white;
            background: #6c63ff;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .links a:hover {
            background: #8a84ff;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="pelado.jpeg" alt="Mi foto">

        <h1>FacuugiorDNG</h1>
        <p>Streamer 🎮 | Creador de contenido | Programador junior</p>

        <p>📧 facuugiorlando@gmail.com</p>

        <div class="links">
            <a href="https://www.instagram.com/facuugior.dng/" target="_blank">INSTAGRAM</a>
            <a href="https://kick.com/facuugiordng" target="_blank">KICK</a>
            <a href="https://www.youtube.com/@facuugiorDNG" target="_blank">YOUTUBE</a>
        </div>
    </div>

</body>
</html>
